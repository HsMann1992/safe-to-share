        const FadeInSection = ({ children, delay = 0, className = "" }) => {
            const [isVisible, setVisible] = useState(false);
            const domRef = useRef();
            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => { if (entry.isIntersecting) setVisible(true); });
                }, { threshold: 0.05 });
                if (domRef.current) observer.observe(domRef.current);
                return () => observer.disconnect();
            }, []);
            return (
                <div ref={domRef} className={`fade-in-section ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'} ${className}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );

// --- MOCK SCHEDULE LOGIC ---
const generateMockSchedule = (coachName) => {
  const schedule = [];
  const today = new Date();

  for (let i = 1; i <= 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);

    if (d.getDay() === 0 || d.getDay() === 6) continue;

    const seed = (coachName?.length || 0) + d.getDate();
    const allSlots = ['09:00', '10:00', '11:00', '13:30', '14:30', '15:30', '16:00'];
    const availableSlots = allSlots.filter((_, idx) => (seed + idx) % 3 !== 0);

    schedule.push({
      date: d,
      slots: availableSlots
    });

    if(schedule.length === 4) break; 
  }
  return schedule;
};

const AIAssessmentSection = ({ content }) => {
  const [text, setText] = useState('');
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [result, setResult] = useState(null);

  const handleSubmit = () => {
    if (!text.trim()) return;
    setIsAnalyzing(true);
    setResult(null);
    setTimeout(() => {
      setIsAnalyzing(false);
      try {
        const lowerText = text.toLowerCase();
        const isZone1 = ["ตาย", "ไม่อยากอยู่", "ไม่อยากตื่น", "ทำร้ายตัวเอง", "ทรมาน", "ดิ่ง", "หดหู่", "ไม่ไหว", "แพนิค", "เศร้า", "ร้องไห้", "ซึมเศร้า", "depress", "cry", "sad", "anxiety", "panic", "suicide", "die", "抑郁", "哭", "痛苦", "死", "不想活"].some(k => lowerText.includes(k));
        const isZone2 = ["เครียด", "กดดัน", "หนัก", "burnout", "สับสน", "เหนื่อย", "ท้อ", "ไม่มีเวลา", "มืดแปดด้าน", "stress", "pressure", "exhausted", "burn out", "tired", "压力", "累", "迷茫"].some(k => lowerText.includes(k));
        const isZone3 = ["เบื่อ", "หมดไฟ", "เนือย", "ขี้เกียจ", "ไม่รู้", "เรื่อยๆ", "เซ็ง", "bored", "lazy", "unmotivated", "lost", "无聊", "没动力", "疲倦"].some(k => lowerText.includes(k));
        const isZone4 = ["พัฒนา", "เป้าหมาย", "เติบโต", "มั่นใจ", "ท้าทาย", "เก่งขึ้น", "อยากพัฒนา", "อยากก้าวหน้า", "improve", "goal", "grow", "confidence", "challenge", "better", "发展", "目标", "成长", "自信"].some(k => lowerText.includes(k));
        let matchedDesc = content.ai.defaultDesc;
        if (isZone1) matchedDesc = content.ai.zone1Desc;
        else if (isZone2) matchedDesc = content.ai.zone2Desc;
        else if (isZone4) matchedDesc = content.ai.zone4Desc;
        else if (isZone3) matchedDesc = content.ai.zone3Desc;
        setResult({
          desc: matchedDesc || "ขอบคุณที่แชร์ข้อมูลครับ",
          disclaimer: content.ai.disclaimer
        });
      } catch (err) {
        console.error("AI Analysis Error:", err);
        setIsAnalyzing(false);
      }
    }, 1500);
  };


  const handleClear = () => {
    setText('');
    setResult(null);
  };

  return (
    <div id="ai-assessment" className="py-20 bg-[#eef6f4] relative border-y border-teal-100/50">
      <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <FadeInSection>
          <div className="text-center mb-10">
            <span className="inline-flex items-center gap-2 px-4 py-1.5 bg-white text-teal-800 border border-teal-200 rounded-full text-xs font-bold tracking-widest shadow-sm uppercase mb-6">
              <Bot size={16} className="text-teal-600"/> {content.ai.badge}
            </span>
            <h2 className="text-3xl md:text-4xl font-black text-[#1F3A33] mb-4">
              {content.ai.title}
            </h2>
            <p className="text-teal-800/80 text-lg leading-relaxed max-w-2xl mx-auto font-medium">
              {content.ai.desc}
            </p>
          </div>
        </FadeInSection>

        <FadeInSection delay={200}>
          <div className="bg-white rounded-[2rem] p-6 md:p-8 shadow-xl shadow-teal-900/5 border border-white">
            <div className="relative mb-6">
              <textarea 
                rows="5"
                className="w-full bg-[#f8fbfb] border-2 border-teal-50 rounded-2xl p-5 text-gray-700 placeholder-gray-400 focus:outline-none focus:border-teal-400 focus:bg-white transition-all resize-none font-medium"
                placeholder={content.ai.placeholder}
                value={text}
                onChange={(e) => setText(e.target.value)}
                disabled={isAnalyzing}
              ></textarea>
            </div>

            <div className="flex flex-col sm:flex-row gap-4 mb-2">
              <button 
                onClick={handleSubmit}
                disabled={isAnalyzing || !text.trim()}
                className={`flex-1 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all ${
                  isAnalyzing || !text.trim()

                  <><Send size={20} /> {content.ai.submit}</>

                    {/* Disclaimer Box */}

const formatDate = (date, lang) => {
  if (!date) return '';
  const locales = { th: 'th-TH', en: 'en-US', zh: 'zh-CN' };
  return date.toLocaleDateString(locales[lang] || 'th-TH', { weekday: 'short', day: 'numeric', month: 'short' });
};

        <button 
          onClick={onClose}
          className="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-full transition-colors z-10"
        >
          <X size={20} />
        </button>

        {step === 3 ? (
          /* --- STEP 3: SUCCESS (EMAIL SENT SIMULATION) --- */
          <div className="p-10 text-center animate-in zoom-in-95 duration-500">
            <div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 text-green-500 relative">
              <Mail size={40} strokeWidth={2} className="absolute animate-pulse" />
              <CheckCircle2 size={24} className="absolute bottom-2 right-2 bg-white rounded-full text-green-600" />
            </div>
            <h3 className="text-2xl font-bold text-gray-900 mb-3">{content.modal.successTitle}</h3>
            <div className="text-gray-600 mb-8 leading-relaxed">
              <p>{content.modal.successDesc1} <strong className="text-teal-700">{content.modal.successDesc2} {preselectedCoach}</strong></p>
              <div className="mt-4 inline-block bg-teal-50 border border-teal-100 px-6 py-4 rounded-2xl">
                <p className="font-bold text-teal-900 mb-1 flex items-center justify-center gap-2"><CalendarDays size={18} /> {formatDate(schedules[selectedDateIndex]?.date, lang)}</p>
                <p className="font-bold text-teal-700 text-lg flex items-center justify-center gap-2"><Clock size={18} /> {content.modal.timePrefix} {selectedTime}</p>
              </div>
            </div>
            <button 
              onClick={onClose}
              className="w-full py-4 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-bold transition-colors shadow-md active:scale-95"
            >
              {content.modal.closeBtn}
            </button>
          </div>
        ) : (
          <div className="p-8 md:p-10">
            {/* Header */}
            <div className="mb-8">
              <h3 className="text-2xl font-bold text-gray-900 mb-2">{content.modal.title}</h3>
              <p className="text-gray-500 text-sm leading-relaxed">{content.modal.desc}</p>

              {/* Progress Bar */}
              <div className="flex gap-2 mt-6">
                <div className={`h-1.5 flex-1 rounded-full ${step >= 1 ? 'bg-teal-500' : 'bg-gray-200'}`}></div>
                <div className={`h-1.5 flex-1 rounded-full transition-colors duration-300 ${step >= 2 ? 'bg-teal-500' : 'bg-gray-200'}`}></div>
              </div>
              <div className="flex justify-between mt-2 text-xs font-bold text-gray-400">
                <span className={step >= 1 ? 'text-teal-600' : ''}>{content.modal.step1}</span>
                <span className={step >= 2 ? 'text-teal-600' : ''}>{content.modal.step2}</span>
              </div>
            </div>

            {step === 1 && (
              /* --- STEP 1: PERSONAL INFO --- */
              <form onSubmit={handleNextStep} className="space-y-5 animate-in slide-in-from-right-4 duration-300">
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2">{content.modal.labelCoach}</label>
                  <div className="relative">
                    <input 
                      type="text" 
                      readOnly
                      value={preselectedCoach || content.modal.unselected}
                      className="w-full px-4 py-3.5 bg-teal-50/50 border border-teal-100 rounded-xl text-teal-900 font-bold focus:outline-none cursor-default"
                    />
                    <div className="absolute right-4 top-1/2 -translate-y-1/2 text-teal-600">
                      <UserCheck size={20} />
                    </div>
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2">{content.modal.labelName}</label>
                  <input 
                    type="text" 
                    required
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    placeholder={content.modal.placeName}
                    className="w-full px-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all placeholder-gray-400"
                  />
                </div>

                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2">{content.modal.labelContact}</label>
                  <input 
                    type="text" 
                    required
                    value={contact}
                    onChange={(e) => setContact(e.target.value)}
                    placeholder={content.modal.placeContact}
                    className="w-full px-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all placeholder-gray-400"
                  />
                </div>

                <div className="pt-6">
                  <button 
                    type="submit"
                    className="w-full py-4 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-bold transition-all shadow-lg shadow-teal-600/30 active:scale-95 flex justify-center items-center gap-2"
                  >
                    {content.modal.nextBtn} <ChevronRight size={18} />
                  </button>
                </div>
              </form>
            )}

            {step === 2 && (
              /* --- STEP 2: SCHEDULE PICKER --- */
              <form onSubmit={handleSubmit} className="animate-in slide-in-from-right-4 duration-300 flex flex-col h-full">

                {/* Date Selection (Horizontal Scroll) */}
                <div className="mb-6">
                  <label className="block text-sm font-bold text-gray-700 mb-3">{content.modal.selectDate}</label>
                  <div className="flex gap-3 overflow-x-auto pb-4 pt-1 snap-x scrollbar-hide -mx-2 px-2">
                    {schedules.map((schedule, idx) => (
                      <button
                        key={idx}
                        type="button"
                        onClick={() => { setSelectedDateIndex(idx); setSelectedTime(''); }}
                        className={`flex flex-col items-center justify-center min-w-[80px] p-3 rounded-2xl border-2 transition-all snap-start ${
                          selectedDateIndex === idx 
                          ? 'border-teal-500 bg-teal-50 text-teal-900 shadow-md' 
                          : 'border-gray-100 bg-white text-gray-500 hover:border-teal-200 hover:bg-teal-50/50'
                        }`}
                      >
                        <span className="text-xs font-bold uppercase mb-1">{schedule.date.toLocaleDateString(lang === 'zh' ? 'en-US' : (lang==='en'?'en-US':'th-TH'), { weekday: 'short' })}</span>
                        <span className="text-xl font-black">{schedule.date.getDate()}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Time Slots Grid */}
                <div className="mb-8">
                  <label className="block text-sm font-bold text-gray-700 mb-3">{content.modal.selectTime}</label>
                  {schedules[selectedDateIndex]?.slots.length > 0 ? (
                    <div className="grid grid-cols-3 gap-3">
                      {schedules[selectedDateIndex].slots.map((time, idx) => (
                        <button
                          key={idx}
                          type="button"
                          onClick={() => setSelectedTime(time)}
                          className={`py-3 rounded-xl font-bold text-sm border-2 transition-all active:scale-95 ${
                            selectedTime === time
                            ? 'border-teal-600 bg-teal-600 text-white shadow-md'
                            : 'border-gray-200 bg-white text-gray-700 hover:border-teal-300 hover:text-teal-700'
                          }`}
                        >
                          {time}
                        </button>
                      ))}
                    </div>
                  ) : (
                    <div className="bg-gray-50 text-gray-500 p-4 rounded-xl text-center text-sm font-medium border border-dashed border-gray-300">
                      {content.modal.noTimeSlots}
                    </div>
                  )}
                </div>

                {/* Actions */}
                <div className="pt-2 mt-auto">
                  {isSubmitting ? (
                    <div className="w-full py-4 bg-teal-700 text-white rounded-xl font-bold flex items-center justify-center gap-3 opacity-90 cursor-not-allowed">
                      <Sparkles size={20} className="animate-spin" /> {content.modal.sendingEmail}
                    </div>
                  ) : (
                    <div className="flex gap-3">
                      <button 
                        type="button"
                        onClick={() => setStep(1)}
                        className="py-4 px-6 bg-white border-2 border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50 rounded-xl font-bold transition-all active:scale-95 flex items-center justify-center"
                      >
                        <ArrowLeft size={18} />
                      </button>
                      <button 
                        type="submit"
                        disabled={!selectedTime}
                        className={`flex-1 py-4 rounded-xl font-bold transition-all shadow-lg active:scale-95 flex justify-center items-center gap-2 ${
                          !selectedTime ? 'bg-gray-300 text-gray-500 cursor-not-allowed shadow-none' : 'bg-teal-600 hover:bg-teal-700 text-white shadow-teal-600/30'
                        }`}
                      >
                        <Mail size={18} /> {content.modal.submitBtn}
                      </button>
                    </div>
                  )}
                </div>

              </form>
            )}

            <p className="text-xs text-center text-gray-400 mt-5 flex items-center justify-center gap-1.5 font-medium">
              <Lock size={12} /> {content.modal.privacyNote}
            </p>
          </div>
        )}
      </div>
    </div>
  );
};

const Footer = ({ content }) => (
  <footer className="bg-teal-950 text-teal-200 pt-20 pb-12 relative overflow-hidden">
    <div className="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-teal-500 via-transparent to-transparent"></div>
    <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">

      {/* 100% Strictly Confidential (Moved above SAFE TO SHARE) */}
      <FadeInSection>
        <div className="mb-16 max-w-3xl mx-auto flex flex-col items-center gap-3">
          <div className="text-emerald-500/80 mb-1">
            <Lock size={28} />
          </div>
          <h4 className="text-white/90 font-bold text-xl md:text-2xl tracking-wide">{content.confidential.title}</h4>
          <p className="text-teal-500/80 text-sm md:text-base font-medium leading-relaxed max-w-2xl">
            {content.confidential.desc}
          </p>
        </div>
      </FadeInSection>

      {/* SAFE TO SHARE Section */}
      <div className="flex items-center justify-center gap-3 mb-6 hover:scale-105 transition-transform duration-500 cursor-default">
        <ShieldCheck className="text-teal-500 w-10 h-10" />
        <span className="font-bold text-3xl text-white tracking-tight">SAFE TO SHARE</span>
      </div>
      <p className="mb-8 max-w-md mx-auto text-teal-400/80 leading-relaxed text-lg">
        {content.footer.desc}
      </p>
      <div className="font-bold text-teal-500 mb-12 uppercase tracking-[0.3em] text-xs">
        CoachHub • Forward Together
      </div>

      <div className="border-t border-teal-900/80 pt-8 text-sm text-teal-600/60 font-medium">
        &copy; 2026 Safe To Share Program. All rights reserved.
      </div>
    </div>
  </footer>
);

function App() {
  const [lang, setLang] = useState('th'); 
  const [isModalOpen, setIsModalOpen] = useState(false);
  const [selectedCoach, setSelectedCoach] = useState('');
  const [scrollPosition, setScrollPosition] = useState(0);

  useEffect(() => {
    const handleScroll = () => setScrollPosition(window.scrollY);
    window.addEventListener('scroll', handleScroll, { passive: true });
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  const content = t[lang];

  const handleRegisterClick = (coachName) => {
    setSelectedCoach(coachName);
    setIsModalOpen(true);
  };

  return (
    <div className="min-h-screen font-sans bg-gray-50 selection:bg-teal-200 selection:text-teal-900 scroll-smooth overflow-x-hidden text-gray-800">
      <Navbar lang={lang} setLang={setLang} content={content} scrollPosition={scrollPosition} />
      <Hero content={content} />
      <Values content={content} />
      <ComparisonSection content={content} />
      <AIAssessmentSection content={content} />
      <Steps content={content} />
      <CoachesSection lang={lang} content={content} onRegister={handleRegisterClick} />
      <FAQSection lang={lang} content={content} />
      <Footer content={content} />

      <RegistrationModal 
        isOpen={isModalOpen} 
        onClose={() => setIsModalOpen(false)} 
        preselectedCoach={selectedCoach}
        content={content}
        lang={lang}
      />

      {/* Back to top button */}
      <button 
        onClick={() => window.scrollTo({top:0, behavior:'smooth'})}
        className={`fixed bottom-6 right-6 p-3 bg-white text-teal-600 rounded-full shadow-lg border border-teal-100 hover:bg-teal-50 hover:text-teal-700 hover:scale-110 active:scale-95 transition-all duration-300 z-40 ${scrollPosition > 500 ? 'translate-y-0 opacity-100' : 'translate-y-16 opacity-0'}`}
        aria-label="Back to top"
      >
        <ArrowUp size={24} />
      </button>
    </div>
  );
}

        // --- END OF APP LOGIC ---

        const root = ReactDOM.createRoot(document.getElementById('root'));
        const AppWrapper = () => {
            useEffect(() => {
                 

                 

            }, []);
            return <App />;
        };
        root.render(<AppWrapper />);
    </script>
</body>
