<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe To Share - CoachHub</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom Styles & Animations -->
  <style>
    @keyframes float-slow {
      0% { transform: translate(0px, 0px) scale(1) rotate(0deg); opacity: 0.6; }
      33% { transform: translate(2vw, -3vh) scale(1.05) rotate(2deg); opacity: 0.8; }
      66% { transform: translate(-3vw, 2vh) scale(0.95) rotate(-2deg); opacity: 0.5; }
      100% { transform: translate(0px, 0px) scale(1) rotate(0deg); opacity: 0.6; }
    }
    .animate-float-slow { animation: float-slow 25s infinite ease-in-out; }
    .delay-1 { animation-delay: -7s; }
    .delay-2 { animation-delay: -14s; }
    .delay-3 { animation-delay: -21s; }
    
    @keyframes blink {
      0%, 95%, 98% { transform: scaleY(1); }
      96%, 97% { transform: scaleY(0.1); }
    }
    .animate-blink {
      transform-origin: center;
      transform-box: fill-box;
      animation: blink 5s infinite;
    }
    
    @keyframes spin-slow {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.05); }
      100% { transform: rotate(360deg) scale(1); }
    }
    .animate-spin-slow {
      animation: spin-slow 8s linear infinite;
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    /* Initial state for fade-in sections */
    .fade-in-section {
      opacity: 0;
      transform: translateY(3rem);
      transition: opacity 1s ease-out, transform 1s ease-out;
    }
    .fade-in-section.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body class="bg-[#FAFCFC] selection:bg-teal-200 selection:text-teal-900 scroll-smooth overflow-x-hidden text-gray-800 relative font-sans">

  <!-- Floating Background (Parallax & Glow) -->
  <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-br from-[#f4faf9] via-white to-[#f0f8ff] opacity-90"></div>
    <div id="parallax-1" class="absolute inset-0 transition-transform duration-1000 ease-out will-change-transform">
      <div class="absolute top-[-10%] left-[-10%] w-[55vw] h-[55vw] bg-teal-200/20 rounded-full filter blur-[120px] animate-float-slow"></div>
    </div>
    <div id="parallax-2" class="absolute inset-0 transition-transform duration-1000 ease-out will-change-transform">
      <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-sky-200/20 rounded-full filter blur-[120px] animate-float-slow delay-2"></div>
    </div>
    <div id="glow-blob" class="absolute w-[45vw] h-[45vw] max-w-[600px] max-h-[600px] bg-emerald-100/30 rounded-full blur-[120px] -translate-x-1/2 -translate-y-1/2 will-change-transform" style="left: 50%; top: 50%;"></div>
  </div>

  <!-- Navbar -->
  <nav id="navbar" class="fixed top-0 z-40 w-full transition-all duration-300 bg-transparent py-4">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-12 md:h-14">
        <div class="flex items-center gap-2 group cursor-pointer" onclick="window.scrollTo({top:0, behavior:'smooth'})">
          <i data-lucide="shield-check" id="nav-logo-icon" class="w-8 h-8 transition-transform group-hover:scale-110 text-teal-700"></i>
          <span class="font-bold text-xl tracking-tight text-teal-900">SAFE TO SHARE</span>
        </div>

        <div class="hidden lg:flex space-x-6 xl:space-x-8">
          <a href="#about" data-i18n="nav.about" class="text-teal-800 hover:text-teal-500 font-medium transition-all"></a>
          <a href="#compare" data-i18n="nav.compare" class="text-teal-800 hover:text-teal-500 font-medium transition-all"></a>
          <a href="#ai-assessment" data-i18n="nav.ai" class="text-teal-800 hover:text-teal-500 font-medium transition-all"></a>
          <a href="#steps" data-i18n="nav.steps" class="text-teal-800 hover:text-teal-500 font-medium transition-all"></a>
          <a href="#coaches" data-i18n="nav.coaches" class="text-teal-800 hover:text-teal-500 font-medium transition-all"></a>
        </div>

        <div class="flex items-center gap-3">
          <div class="relative">
            <button id="lang-btn" class="flex items-center gap-2 text-sm font-bold text-gray-700 bg-white/50 backdrop-blur-sm border border-gray-200 px-3 py-2 rounded-xl transition-all">
              <i data-lucide="globe" class="w-4 h-4"></i> 
              <span id="current-lang-label">TH</span> 
              <i data-lucide="chevron-down" id="lang-chevron" class="w-3.5 h-3.5 transition-transform duration-300"></i>
            </button>
            <div id="lang-dropdown" class="hidden absolute right-0 mt-2 w-40 bg-white rounded-xl shadow-2xl border border-gray-100 py-2 z-50 overflow-hidden">
              <button onclick="setLang('th')" class="w-full text-left px-5 py-3 text-[15px] font-bold transition-colors flex items-center justify-between text-teal-700 bg-teal-50">
                TH - ไทย <i data-lucide="check-circle-2" class="w-4 h-4 text-teal-600 lang-check" data-lang="th"></i>
              </button>
              <button onclick="setLang('en')" class="w-full text-left px-5 py-3 text-[15px] font-bold transition-colors flex items-center justify-between text-gray-600 hover:bg-gray-50">
                EN - Eng <i data-lucide="check-circle-2" class="w-4 h-4 text-teal-600 lang-check hidden" data-lang="en"></i>
              </button>
              <button onclick="setLang('zh')" class="w-full text-left px-5 py-3 text-[15px] font-bold transition-colors flex items-center justify-between text-gray-600 hover:bg-gray-50">
                CN - 中文 <i data-lucide="check-circle-2" class="w-4 h-4 text-teal-600 lang-check hidden" data-lang="zh"></i>
              </button>
            </div>
          </div>
          <a href="#coaches" data-i18n="nav.register" class="hidden sm:inline-block bg-teal-600 hover:bg-teal-700 text-white px-5 py-2 rounded-xl font-bold transition-all shadow-md active:scale-95"></a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="relative z-10">
    
    <!-- Hero Section -->
    <div class="relative overflow-hidden pt-28 pb-20 lg:pt-36 lg:pb-28">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="text-center max-w-3xl mx-auto">
          <div class="fade-in-section inline-flex items-center gap-2 px-4 py-2 rounded-full bg-teal-100/80 backdrop-blur-sm text-teal-800 font-medium text-sm mb-6 animate-bounce" style="animation-duration: 3s; transition-delay: 0ms;">
            <i data-lucide="heart-handshake" class="w-4 h-4"></i> <span data-i18n="hero.subtitle"></span>
          </div>
          <h1 data-i18n="hero.title" class="fade-in-section text-4xl md:text-5xl lg:text-6xl font-extrabold text-teal-900 leading-tight mb-6" style="transition-delay: 100ms;"></h1>
          <p class="fade-in-section text-xl text-teal-700 mb-10 leading-relaxed" style="transition-delay: 200ms;">
            <span data-i18n="hero.desc1"></span><br/>
            <span data-i18n="hero.desc2"></span> 
            <span data-i18n="hero.highlight" class="font-bold text-teal-800 bg-teal-100/50 px-2 py-0.5 rounded-lg"></span>
          </p>
          <div class="fade-in-section flex flex-col sm:flex-row gap-4 justify-center" style="transition-delay: 300ms;">
            <a href="#coaches" class="bg-teal-600 hover:bg-teal-700 text-white px-8 py-4 rounded-full font-semibold text-lg transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2 group">
              <span data-i18n="hero.btn"></span> <i data-lucide="chevron-right" class="w-5 h-5 transition-transform group-hover:translate-x-1"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Values / About Section -->
    <div id="about" class="py-20 relative z-10">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="fade-in-section text-center mb-16">
          <h2 data-i18n="about.title" class="text-3xl font-bold text-teal-900 mb-4"></h2>
          <p data-i18n="about.desc" class="text-lg text-gray-600 max-w-3xl mx-auto leading-relaxed"></p>
        </div>
        <div class="grid md:grid-cols-3 gap-8 items-stretch">
          <!-- Card 1 -->
          <div class="fade-in-section h-full" style="transition-delay: 0ms;">
            <div class="glass-card hover:bg-emerald-50/90 p-8 rounded-3xl text-center transition-all duration-300 hover:shadow-xl hover:-translate-y-2 h-full flex flex-col group">
              <div class="bg-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm text-emerald-600 group-hover:scale-110 transition-transform">
                <i data-lucide="lock" class="w-8 h-8"></i>
              </div>
              <h3 data-i18n="about.val1.title" class="text-xl font-bold text-teal-900 mb-3"></h3>
              <p data-i18n="about.val1.desc" class="text-gray-600 mt-auto"></p>
            </div>
          </div>
          <!-- Card 2 -->
          <div class="fade-in-section h-full" style="transition-delay: 150ms;">
            <div class="glass-card hover:bg-emerald-50/90 p-8 rounded-3xl text-center transition-all duration-300 hover:shadow-xl hover:-translate-y-2 h-full flex flex-col group">
              <div class="bg-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm text-emerald-600 group-hover:scale-110 transition-transform">
                <i data-lucide="heart-handshake" class="w-8 h-8"></i>
              </div>
              <h3 data-i18n="about.val2.title" class="text-xl font-bold text-teal-900 mb-3"></h3>
              <p data-i18n="about.val2.desc" class="text-gray-600 mt-auto"></p>
            </div>
          </div>
          <!-- Card 3 -->
          <div class="fade-in-section h-full" style="transition-delay: 300ms;">
            <div class="glass-card hover:bg-emerald-50/90 p-8 rounded-3xl text-center transition-all duration-300 hover:shadow-xl hover:-translate-y-2 h-full flex flex-col group">
              <div class="bg-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm text-emerald-600 group-hover:scale-110 transition-transform">
                <i data-lucide="chevron-right" class="w-8 h-8"></i>
              </div>
              <h3 data-i18n="about.val3.title" class="text-xl font-bold text-teal-900 mb-3"></h3>
              <p data-i18n="about.val3.desc" class="text-gray-600 mt-auto"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Comparison Section -->
    <div id="compare" class="py-20 relative z-10">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        
        <div class="fade-in-section text-center mb-16 relative">
          <div class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-teal-900 text-teal-50 font-bold text-sm tracking-widest shadow-md mb-8">
            <i data-lucide="sparkles" class="w-4 h-4 text-yellow-400 animate-pulse"></i>
            <span data-i18n="compare.badge"></span>
          </div>
          <h2 class="text-3xl md:text-5xl font-extrabold text-teal-900 mb-6 leading-tight">
            <span data-i18n="compare.title1"></span> <br/><span data-i18n="compare.title2"></span>
          </h2>
          <div class="text-gray-600 text-lg md:text-xl max-w-3xl mx-auto font-medium">
            <p data-i18n="compare.subtitle1" class="mb-4"></p>
            <div class="flex flex-wrap items-center justify-center gap-3 mb-4">
              <span class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-teal-200 text-teal-800 rounded-lg shadow-sm font-bold">
                <i data-lucide="sprout" class="w-5 h-5 text-teal-600"></i> <span data-i18n="compare.coachBtn"></span>
              </span>
              <span data-i18n="compare.or" class="text-gray-400 text-sm font-semibold"></span>
              <span class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-rose-200 text-rose-800 rounded-lg shadow-sm font-bold">
                <i data-lucide="heart-pulse" class="w-5 h-5 text-rose-600"></i> <span data-i18n="compare.psychBtn"></span>
              </span>
            </div>
            <p data-i18n="compare.subtitle2"></p>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8 mb-24 max-w-5xl mx-auto items-stretch">
          <!-- Coach Info -->
          <div class="fade-in-section h-full" style="transition-delay: 100ms;">
            <div class="group glass-card rounded-[2.5rem] p-8 relative overflow-hidden flex flex-col h-full hover:shadow-2xl transition-all cursor-default">
              <div class="absolute top-0 right-0 -translate-y-4 translate-x-4 opacity-5 pointer-events-none group-hover:rotate-12 transition-transform duration-700">
                <i data-lucide="sprout" class="w-40 h-40"></i>
              </div>
              <div class="flex items-center gap-5 mb-8 relative z-10">
                <div class="w-20 h-20 bg-teal-50 rounded-full flex items-center justify-center text-teal-600 shrink-0 border-2 border-teal-100 group-hover:bg-teal-600 group-hover:text-white transition-all shadow-inner">
                  <i data-lucide="sprout" class="w-10 h-10 group-hover:animate-bounce" stroke-width="2.5"></i>
                </div>
                <div>
                  <h3 data-i18n="compare.coach.title" class="text-3xl font-black text-gray-900 group-hover:text-teal-700 transition-colors"></h3>
                  <p data-i18n="compare.coach.subtitle" class="text-gray-500 font-bold text-base mt-1"></p>
                </div>
              </div>
              <div class="bg-white border-2 border-teal-100 rounded-3xl p-6 mb-10 shadow-sm relative z-10 text-center">
                <p data-i18n="compare.coach.quote" class="text-teal-800 font-bold text-lg leading-relaxed italic"></p>
              </div>
              <ul id="compare-coach-items" class="space-y-6 relative z-10 flex-grow"></ul>
            </div>
          </div>

          <!-- Psych Info -->
          <div class="fade-in-section h-full" style="transition-delay: 200ms;">
            <div class="group glass-card rounded-[2.5rem] p-8 relative overflow-hidden flex flex-col h-full hover:shadow-2xl transition-all cursor-default">
              <div class="absolute top-0 right-0 -translate-y-4 translate-x-4 opacity-5 pointer-events-none group-hover:rotate-12 transition-transform duration-700">
                <i data-lucide="heart-pulse" class="w-40 h-40"></i>
              </div>
              <div class="flex items-center gap-5 mb-8 relative z-10">
                <div class="w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center text-rose-600 shrink-0 border-2 border-rose-100 group-hover:bg-rose-500 group-hover:text-white transition-all shadow-inner">
                  <i data-lucide="heart-pulse" class="w-10 h-10 group-hover:animate-bounce" stroke-width="2.5"></i>
                </div>
                <div>
                  <h3 data-i18n="compare.psych.title" class="text-3xl font-black text-gray-900 group-hover:text-rose-700 transition-colors"></h3>
                  <p data-i18n="compare.psych.subtitle" class="text-gray-500 font-bold text-base mt-1"></p>
                </div>
              </div>
              <div class="bg-white border-2 border-rose-100 rounded-3xl p-6 mb-10 shadow-sm relative z-10 text-center">
                <p data-i18n="compare.psych.quote" class="text-rose-800 font-bold text-lg leading-relaxed italic"></p>
              </div>
              <ul id="compare-psych-items" class="space-y-6 relative z-10 flex-grow"></ul>
            </div>
          </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-16 max-w-6xl mx-auto items-stretch">
          
          <!-- Step 1 Matrix -->
          <div class="fade-in-section h-full" style="transition-delay: 100ms;">
            <div class="flex flex-col h-full w-full">
              <div class="mb-6">
                <span data-i18n="compare.step1.badge" class="inline-block px-3 py-1 bg-white text-gray-700 border border-gray-200 rounded-full text-xs font-bold tracking-wider mb-3 shadow-sm uppercase"></span>
                <h3 data-i18n="compare.step1.title" class="text-2xl font-extrabold text-gray-900 mb-2"></h3>
                <p data-i18n="compare.step1.desc" class="text-gray-500 text-sm leading-relaxed max-w-md"></p>
              </div>
              
              <div class="flex flex-col flex-grow">
                <div class="flex flex-row relative h-[420px] md:h-[450px]">
                  <div class="w-16 flex flex-col items-center justify-between py-6 relative z-10">
                    <div class="flex flex-col items-center gap-1 -mt-4">
                      <i data-lucide="cloud-lightning" class="w-[22px] h-[22px] text-purple-700 fill-current" stroke-width="1"></i>
                      <span data-i18n="compare.step1.yAxisTop" class="text-[11px] font-extrabold text-rose-800/80 tracking-wide text-center leading-tight"></span>
                    </div>
                    <div class="flex-1 w-[3px] bg-gray-200 rounded-full my-4 relative flex items-center justify-center">
                      <div class="bg-[#f9fafb] py-4 px-2 absolute rounded-md whitespace-nowrap z-20 shadow-sm" style="writing-mode: vertical-rl; transform: rotate(180deg);">
                        <span data-i18n="compare.step1.yAxisLabel" class="text-gray-400 font-extrabold tracking-[0.25em] text-[11px]"></span>
                      </div>
                    </div>
                    <div class="flex flex-col items-center gap-1 -mb-4">
                      <span data-i18n="compare.step1.yAxisBottom" class="text-[11px] font-extrabold text-orange-600/80 tracking-wide text-center leading-tight"></span>
                      <i data-lucide="sun" class="w-6 h-6 text-orange-500" stroke-width="2.5"></i>
                    </div>
                  </div>
                  
                  <div class="flex-1 glass-card rounded-[2.5rem] p-4 shadow-sm relative ml-2">
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-gray-100 border-[6px] border-white rounded-full z-20 shadow-sm"></div>
                    <div class="grid grid-cols-2 grid-rows-2 h-full w-full gap-4 relative">
                      
                      <!-- Q1 -->
                      <div class="bg-[#fef6f8]/90 border-[1.5px] border-[#fce9ef] rounded-[2rem] p-4 flex flex-col items-center justify-center text-center hover:scale-[1.03] transition-all group cursor-default relative overflow-hidden">
                        <div class="flex flex-col items-center transition-all group-hover:-translate-y-3">
                          <div class="w-12 h-12 rounded-full flex items-center justify-center mb-3 shadow-inner">
                            <i data-lucide="heart" class="w-8 h-8 text-pink-500 group-hover:scale-110 transition-transform fill-current" stroke-width="1"></i>
                          </div>
                          <h4 data-i18n="compare.step1.q1.title" class="font-extrabold text-[#e0667d] text-lg mb-1.5 group-hover:text-pink-700"></h4>
                          <p data-i18n-html="compare.step1.q1.desc" class="text-[13px] text-[#db7589] font-semibold leading-snug whitespace-pre-line"></p>
                        </div>
                        <div class="absolute bottom-4 opacity-0 group-hover:opacity-100 transition-all pointer-events-none w-full flex justify-center">
                          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white border border-pink-200 text-pink-600 rounded-full text-[11px] font-extrabold shadow-sm">
                            <i data-lucide="heart-pulse" class="w-3.5 h-3.5" stroke-width="2.5"></i> <span data-i18n="compare.step1.recPsych"></span>
                          </span>
                        </div>
                      </div>

                      <!-- Q2 -->
                      <div class="bg-[#fefcf3]/90 border-[1.5px] border-[#fcf3d9] rounded-[2rem] p-4 flex flex-col items-center justify-center text-center hover:scale-[1.03] transition-all group cursor-default relative overflow-hidden">
                        <div class="flex flex-col items-center transition-all group-hover:-translate-y-3">
                          <div class="w-12 h-12 rounded-full flex items-center justify-center mb-3 shadow-inner">
                            <i data-lucide="brain-circuit" class="w-8 h-8 text-amber-500 group-hover:scale-110 transition-transform" stroke-width="1.5"></i>
                          </div>
                          <h4 data-i18n="compare.step1.q2.title" class="font-extrabold text-[#d98b46] text-lg mb-1.5 group-hover:text-amber-700"></h4>
                          <p data-i18n-html="compare.step1.q2.desc" class="text-[13px] text-[#d98b46] font-semibold leading-snug whitespace-pre-line"></p>
                        </div>
                        <div class="absolute bottom-4 opacity-0 group-hover:opacity-100 transition-all pointer-events-none w-full flex justify-center">
                          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white border border-amber-200 text-amber-600 rounded-full text-[11px] font-extrabold shadow-sm">
                            <i data-lucide="sprout" class="w-3.5 h-3.5" stroke-width="2.5"></i> <span data-i18n="compare.step1.recCoach"></span>
                          </span>
                        </div>
                      </div>

                      <!-- Q3 -->
                      <div class="bg-[#f4f7fb]/90 border-[1.5px] border-[#e2ebf4] rounded-[2rem] p-4 flex flex-col items-center justify-center text-center hover:scale-[1.03] transition-all group cursor-default relative overflow-hidden">
                        <div class="flex flex-col items-center transition-all group-hover:-translate-y-3">
                          <div class="w-12 h-12 rounded-full flex items-center justify-center mb-3 shadow-inner">
                            <i data-lucide="battery" class="w-8 h-8 text-[#84a98c] group-hover:scale-110 transition-transform fill-[#d1e0d7]" stroke-width="1"></i>
                          </div>
                          <h4 data-i18n="compare.step1.q3.title" class="font-extrabold text-[#5c80a8] text-lg mb-1.5 group-hover:text-blue-700"></h4>
                          <p data-i18n-html="compare.step1.q3.desc" class="text-[13px] text-[#7192b8] font-semibold leading-snug whitespace-pre-line"></p>
                        </div>
                        <div class="absolute bottom-4 opacity-0 group-hover:opacity-100 transition-all pointer-events-none w-full flex justify-center">
                          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white border border-blue-200 text-[#5c80a8] rounded-full text-[11px] font-extrabold shadow-sm">
                            <i data-lucide="sprout" class="w-3.5 h-3.5" stroke-width="2.5"></i> <span data-i18n="compare.step1.recCoach"></span>
                          </span>
                        </div>
                      </div>

                      <!-- Q4 -->
                      <div class="bg-[#f0f7f3]/90 border-[1.5px] border-[#d7eadf] rounded-[2rem] p-4 flex flex-col items-center justify-center text-center hover:scale-[1.03] transition-all group cursor-default relative overflow-hidden">

        about: { title: 'SAFE TO SHARE คืออะไร?', desc: 'โครงการนี้คือพื้นที่ปลอดภัยสำหรับพนักงานทุกคน ที่ตั้งใจสร้างขึ้นมาเพื่อให้คุณได้แวะมาพัก ทบทวนเรื่องราวต่างๆ อย่างสบายใจ โดยมีโค้ชคอยรับฟังและช่วยให้คุณมองเห็นทางเลือกเพื่อก้าวต่อไปอย่างมั่นใจ', val1: { title: 'CONFIDENTIAL', desc: 'ข้อมูลทุกอย่างจะถูกเก็บเป็นความลับ และเราเคารพความเป็นส่วนตัวของคุณเสมอ' }, val2: { title: 'NO JUDGMENT', desc: 'พื้นที่แห่งการรับฟังด้วยความเข้าใจ เปิดกว้าง และปราศจากการตัดสิน' }, val3: { title: 'FORWARD TOGETHER', desc: 'ชวนคิดเพื่อมองปัญหาให้ชัดขึ้น และพร้อมก้าวต่อไปในแบบของคุณ' } },

ชาชีพ', bar1: 'สำรวจอดีตและเยียวยาปมในใจ', bar2: 'ตั้งเป้าหมายและวางแผนอนาคต', bar3: 'ผลักดันให้ลงมือทำ (Action-Oriented)', psychLabel: 'นักจิตฯ', coachLabel: 'ไลฟ์โค้ช' } },
        ai: { badge: 'น้องพิงใจ (AI Listener)', title: 'ให้ "น้องพิงใจ" ช่วยฟังนะ... วันนี้เป็นยังไงบ้าง?', desc: 'พื้นที่ปลอดภัยสำหรับคุณ พิมพ์เล่าเรื่องราวหรือความกังวลให้ "น้องพิงใจ" ฟัง แล้วน้องจะช่วยจับความรู้สึก และแนะนำพี่ๆ โค้ชที่เหมาะกับคุณที่สุดให้เองครับ', placeholder: 'เล่าเรื่องที่อยู่ในใจให้ฟังได้เลย... (เช่น ช่วงนี้งานหนักจนหมดไฟ หรืออยากได้ความมั่นใจในการพรีเซนต์งาน)', submit: 'ส่งเรื่องราวให้น้องพิงใจ', clear: 'ล้างข้อความ', analyzing: 'น้องพิงใจกำลังตั้งใจอ่านข้อความของคุณ...', zone1Desc: 'ขอบคุณที่กล้าแบ่งปันและไว้ใจเล่าให้น้องพิงใจฟังนะครับ ฟังดูเป็นช่วงเวลาที่หนักอึ้งและทรมานใจมากเลย ประเมินเบื้องต้นคุณกำลังอยู่ใน **"โซนเยียวยา"** สิ่งที่สำคัญที่สุดตอนนี้คือการดูแลใจให้กลับมาแข็งแรง น้องพิงใจขอแนะนำให้พบ **"นักจิตวิทยา (Psychologist)"** เป็นอันดับแรก เพื่อให้คุณมีพื้นที่ปลอดภัยในการเยียวยาและจัดการความรู้สึกโดยผู้เชี่ยวชาญครับ', zone2Desc: 'ขอบคุณที่เล่าให้น้องพิงใจฟังนะครับ ตอนนี้คุณน่าจะกำลังแบกความกดดันไว้เยอะจนรู้สึกเหนื่อยล้าไปหมด ประเมินเบื้องต้นคุณอยู่ใน **"โซนสับสน"** (หรือภาวะ Burnout) น้องพิงใจขอแนะนำให้พูดคุยกับ **"ไลฟ์โค้ช (Life Coach)"** เพื่อช่วยรับฟัง คลี่คลายความสับสน และร่วมกันหาทางจัดการความเครียดให้คุณกลับมามีพลังอีกครั้งครับ', zone3Desc: 'ขอบคุณที่แวะมาเล่าให้น้องพิงใจฟังนะครับ อาการเนือยๆ หรือหมดไฟชั่วคราวเป็นเรื่องที่เกิดขึ้นได้กับทุกคนเลย ประเมินเบื้องต้นคุณอยู่ใน **"โซนพักพิง"** น้องพิงใจขอแนะนำให้ลองคุยกับ **"ไลฟ์โค้ช (Life Coach)"** เพื่อทบทวนตัวเอง ค้นหาแรงบันดาลใจใหม่ๆ และจุดประกายให้คุณกลับมามีชีวิตชีวาในการทำงานอีกครั้งครับ', zone4Desc: 'ยอดเยี่ยมไปเลยครับ! ฟังจากสิ่งที่คุณเล่า ประเมินเบื้องต้นคุณกำลังอยู่ใน **"โซนเติบโต"** ที่จิตใจแข็งแรงและพร้อมจะก้าวไปข้างหน้า น้องพิงใจขอแนะนำให้จับคู่กับ **"ไลฟ์โค้ช (Life Coach)"** เพื่อช่วยดึงศักยภาพ วางแผนเป้าหมายให้ชัดเจน และลงมือทำให้สำเร็จตามที่ตั้งใจไว้ครับ', defaultDesc: 'ขอบคุณที่แบ่งปันเรื่องราวให้น้องพิงใจฟังนะครับ จากสิ่งที่คุณเล่ามา ประเมินเบื้องต้นคุณอาจกำลังค้นหาทิศทางหรือความชัดเจนบางอย่าง น้องพิงใจขอแนะนำให้ลองคุยกับ **"ไลฟ์โค้ช (Life Coach)"** เพื่อช่วยจัดระเบียบความคิดครับ แต่หากความรู้สึกนี้เริ่มกระทบการใช้ชีวิตประจำวัน การพบ **"นักจิตวิทยา"** ก็เป็นทางเลือกที่ดีมากเช่นกันครับ', disclaimer: 'หมายเหตุ: การประเมินนี้มาจากน้องพิงใจ เพื่อช่วยเป็นแนวทางเบื้องต้นให้คุณเท่านั้น หากพร้อมแล้ว เลือกลงทะเบียนกับพี่ๆ โค้ชด้านล่างได้เลยครับ' },
        steps: { title: 'ขั้นตอนง่ายๆ', subtitle: 'เริ่มต้นพูดคุยกับเราได้ใน 3 ขั้นตอน', step1: { title: 'เลือกโค้ชที่ใช่', desc: 'เลือกโค้ช 1 ใน 5 ท่านที่คุณรู้สึกสบายใจที่จะคุยด้วย' }, step2: { title: 'ลงทะเบียน', desc: 'กรอกข้อมูลสั้นๆ ใช้เวลาไม่ถึง 1 นาที' }, step3: { title: 'รอการติดต่อกลับ', desc: 'ทีมงานจะประสานงานและติดต่อนัดหมายเวลาที่สะดวก' } },
        topicsTitle: 'วันนี้คุณอยากคุยเรื่องไหน?', topicsSubtitle: 'ลองเลือกหัวข้อที่ใกล้เคียงกับสิ่งที่คุณกำลังคิดอยู่ เพื่อค้นหาโค้ชที่เหมาะสม', filterAll: 'ดูโค้ชทั้งหมด', note: 'หมายเหตุ: คุณสามารถเลือกโค้ชจากความรู้สึกสบายใจได้เลย ไม่จำเป็นต้องเป็น "ปัญหาใหญ่" ก็สามารถแวะมาพูดคุยกันได้ครับ/ค่ะ', coachCard: { strengths: 'จุดแข็งการโค้ช', btn: 'เลือกลงทะเบียนกับ', empty: 'ไม่พบข้อมูลโค้ชในหมวดหมู่นี้ กรุณาเลือกหมวดหมู่ใหม่' }, faqTitle: 'FAQs', faqSubtitle: 'คำถามที่พบบ่อย', confidential: { title: '100% Strictly Confidential', desc: 'ทุกเรื่องราวที่คุณพูดคุยกับโค้ช จะถูกเก็บรักษาเป็นความลับขั้นสูงสุด เพื่อให้คุณสบายใจที่จะระบายและเล่าทุกเรื่องอย่างปลอดภัย' }, footer: { desc: 'พื้นที่พูดคุยแบบส่วนตัวกับโค้ชภายในองค์กร ที่พร้อมรับฟังและช่วยให้คุณ ชัดขึ้น เบาขึ้น และก้าวต่อได้' }, modal: { successTitle: 'ส่งอีเมลนัดหมายสำเร็จ!', successDesc1: 'ระบบได้บันทึกข้อมูลและส่งอีเมลแจ้งไปยัง', successDesc2: 'โค้ช', successDesc3: ' เรียบร้อยแล้ว โค้ชจะรอพบคุณในวันที่:', closeBtn: 'ปิดหน้าต่าง', title: 'นัดหมายการโค้ช', desc: 'กรอกข้อมูลและเลือกเวลาที่คุณสะดวก ข้อมูลจะถูกส่งตรงถึงอีเมลโค้ชทันที', labelCoach: 'โค้ชที่ต้องการพูดคุย', unselected: 'ยังไม่ได้ระบุ', labelName: 'ชื่อ-นามสกุล / ชื่อเล่น (ที่สะดวกให้เรียก)', placeName: 'ระบุชื่อของคุณ', labelContact: 'อีเมล หรือ เบอร์โทรศัพท์สำหรับติดต่อกลับ', placeContact: 'ระบุช่องทางติดต่อ', nextBtn: 'ถัดไป: เลือกวันและเวลา', backBtn: 'ย้อนกลับ', submitBtn: 'ยืนยันและส่งข้อมูลแจ้งโค้ช', privacyNote: 'ข้อมูลของคุณจะถูกรักษาเป็นความลับสูงสุด', selectDate: '1. เลือกวันที่คุณสะดวก', selectTime: '2. เลือกช่วงเวลา (อัปเดตแบบ Real-time)', noTimeSlots: 'ไม่มีคิวว่างในวันนี้ กรุณาเลือกวันอื่น', sendingEmail: 'กำลังบันทึกข้อมูลและส่งอีเมล...', timePrefix: 'เวลา ' }

        hero: { subtitle: 'CoachHub Internal Program', title: 'Safe to Share', desc1: 'A private and secure space to talk with our internal coaches.', desc2: 'We are here to listen with empathy and help you', highlight: '"Find clarity, feel lighter, and move forward."', btn: 'Meet our 5 coaches' },
        about: { title: 'What is SAFE TO SHARE?', desc: 'This program offers a safe psychological space for all employees. It is designed for you to pause, reflect on what matters, and feel completely at ease. Our coaches are here to listen and guide you toward your next steps with confidence.', val1: { title: 'CONFIDENTIAL', desc: 'Your sessions are 100% confidential. We respect your privacy.' }, val2: { title: 'NO JUDGMENT', desc: 'An open space for deep listening, with complete empathy and zero judgment.' }, val3: { title: 'FORWARD TOGETHER', desc: 'Helping you see things clearly and move forward in your own way.' } },

      const parallax2 = document.getElementById('parallax-2');

      window.addEventListener('mousemove', (e) => {
        const clientX = e.clientX;
        const clientY = e.clientY;
        const x = (clientX / window.innerWidth - 0.5) * 2;
        const y = (clientY / window.innerHeight - 0.5) * 2;

        if (glowBlob && glowBlob.animate) {
          glowBlob.animate({ left: `${clientX}px`, top: `${clientY}px` }, { duration: 3000, fill: "forwards", easing: "ease-out" });
        }
        if (parallax1) parallax1.style.transform = `translate(${x * -40}px, ${y * -40}px)`;

    // --- INTERSECTION OBSERVER ---
    function initObserver() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.fade-in-section').forEach(el => observer.observe(el));
    }
    
    function observeNewElements() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.fade-in-section:not(.is-visible)').forEach(el => observer.observe(el));
    }

      container.innerHTML = barsData.map(item => `
        <div class="glass-card rounded-[2rem] p-6 transition-all duration-300 cursor-pointer shadow-sm border-transparent hover:shadow-xl hover:border-teal-200 hover:scale-[1.02] hover:z-10 group/bar">
          <div class="flex items-center gap-3 mb-5">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shadow-inner ${item.bgIcon}">${item.icon}</div>
            <h4 class="font-bold text-lg text-gray-800">${item.text}</h4>
          </div>
          
          <div class="flex items-center gap-4 mb-4">
            <div class="w-24 text-right text-[15px] font-bold text-rose-700 flex items-center justify-end gap-1.5 shrink-0">
              ${item.labelPsych} <i data-lucide="heart-pulse" class="w-4 h-4"></i>
            </div>
            <div class="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden relative group-hover/bar:bg-gray-200 transition-colors">
              <div class="absolute left-0 top-0 bottom-0 bg-rose-500 rounded-full flex items-center justify-end px-3 text-white text-[11px] font-bold transition-all duration-1000 ease-out" style="width: 0%" data-target-width="${item.psychW}"></div>
            </div>
          </div>
          
          <div class="flex items-center gap-4">
            <div class="w-24 text-right text-[15px] font-bold text-teal-700 flex items-center justify-end gap-1.5 shrink-0">
              ${item.labelCoach} <i data-lucide="sprout" class="w-4 h-4"></i>
            </div>
            <div class="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden relative group-hover/bar:bg-gray-200 transition-colors">
              <div class="absolute left-0 top-0 bottom-0 bg-teal-500 rounded-full flex items-center justify-end px-3 text-white text-[11px] font-bold transition-all duration-1000 ease-out" style="width: 0%" data-target-width="${item.coachW}"></div>
            </div>
          </div>
        </div>
      `).join('');

      // Add hover effects for bars
      container.querySelectorAll('.glass-card').forEach(card => {
        card.addEventListener('mouseenter', () => {
           card.querySelectorAll('[data-target-width]').forEach(el => el.style.width = el.getAttribute('data-target-width'));
           container.querySelectorAll('.glass-card').forEach(sibling => {
              if (sibling !== card) sibling.classList.add('opacity-40', 'scale-[0.98]');
           });
        });
        card.addEventListener('mouseleave', () => {
           card.querySelectorAll('[data-target-width]').forEach(el => el.style.width = '0%');
           container.querySelectorAll('.glass-card').forEach(sibling => sibling.classList.remove('opacity-40', 'scale-[0.98]'));
        });

      lucide.createIcons();

    // --- AI ASSESSMENT ---
    function initAIInput() {
      const input = document.getElementById('ai-input');
      const submitBtn = document.getElementById('ai-submit-btn');
      const clearBtn = document.getElementById('ai-clear-btn');

      input.addEventListener('input', (e) => {
        const hasText = e.target.value.trim().length > 0;
        if (hasText && !isAnalyzing) {
          submitBtn.classList.remove('bg-gray-300', 'text-gray-500', 'cursor-not-allowed', 'shadow-none');
          submitBtn.classList.add('bg-[#1a362d]', 'hover:bg-teal-900', 'text-white', 'active:scale-[0.98]');
          submitBtn.disabled = false;
          clearBtn.classList.remove('border-gray-200', 'text-gray-400', 'cursor-not-allowed', 'bg-white/50');
          clearBtn.classList.add('border-gray-300', 'text-gray-600', 'bg-white', 'hover:bg-red-50', 'hover:text-red-500', 'hover:border-red-200', 'active:scale-[0.98]');
          clearBtn.disabled = false;
        } else if(!isAnalyzing) {
          submitBtn.classList.add('bg-gray-300', 'text-gray-500', 'cursor-not-allowed', 'shadow-none');
          submitBtn.classList.remove('bg-[#1a362d]', 'hover:bg-teal-900', 'text-white', 'active:scale-[0.98]');
          submitBtn.disabled = true;
          clearBtn.classList.add('border-gray-200', 'text-gray-400', 'cursor-not-allowed', 'bg-white/50');
          clearBtn.classList.remove('border-gray-300', 'text-gray-600', 'bg-white', 'hover:bg-red-50', 'hover:text-red-500', 'hover:border-red-200', 'active:scale-[0.98]');
          clearBtn.disabled = true;
        }
      });
    }

    function submitAI() {
      const text = document.getElementById('ai-input').value;
      if (!text.trim()) return;
      
      const submitBtn = document.getElementById('ai-submit-btn');
      const submitText = document.getElementById('ai-submit-text');
      const input = document.getElementById('ai-input');
      const resultContainer = document.getElementById('ai-result-container');
      const texts = t[currentLang].ai;

      isAnalyzing = true;
      input.disabled = true;
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i data-lucide="sparkles" class="w-5 h-5 animate-spin"></i> <span>${texts.analyzing}</span>`;
      resultContainer.classList.add('hidden');
      lucide.createIcons();

      setTimeout(() => {
        isAnalyzing = false;
        input.disabled = false;
        submitBtn.innerHTML = `<i data-lucide="send" class="w-5 h-5"></i> <span id="ai-submit-text">${texts.submit}</span>`;
        submitBtn.disabled = false;
        
        const lowerText = text.toLowerCase();
        const isZone1 = ['ตาย', 'ไม่อยากอยู่', 'ไม่อยากตื่น', 'ทำร้ายตัวเอง', 'ทรมาน', 'ดิ่ง', 'หดหู่', 'ไม่ไหว', 'แพนิค', 'เศร้า', 'ร้องไห้', 'ซึมเศร้า', 'depress', 'cry', 'sad', 'anxiety', 'panic', 'suicide', 'die', '抑郁', '哭', '痛苦', '死', '不想活'].some(k => lowerText.includes(k));
        const isZone2 = ['เครียด', 'กดดัน', 'หนัก', 'burnout', 'สับสน', 'เหนื่อย', 'ท้อ', 'ไม่มีเวลา', 'มืดแปดด้าน', 'stress', 'pressure', 'exhausted', 'burn out', 'tired', '压力', '累', '迷茫'].some(k => lowerText.includes(k));
        const isZone3 = ['เบื่อ', 'หมดไฟ', 'เนือย', 'ขี้เกียจ', 'ไม่รู้', 'เรื่อยๆ', 'เซ็ง', 'bored', 'lazy', 'unmotivated', 'lost', '无聊', '没动力', '疲倦'].some(k => lowerText.includes(k));
        const isZone4 = ['พัฒนา', 'เป้าหมาย', 'เติบโต', 'มั่นใจ', 'ท้าทาย', 'เก่งขึ้น', 'อยากพัฒนา', 'อยากก้าวหน้า', 'improve', 'goal', 'grow', 'confidence', 'challenge', 'better', '发展', '目标', '成长', '自信'].some(k => lowerText.includes(k));

        let matchedDesc = texts.defaultDesc;
        if (isZone1) matchedDesc = texts.zone1Desc;
        else if (isZone2) matchedDesc = texts.zone2Desc;
        else if (isZone4) matchedDesc = texts.zone4Desc;
        else if (isZone3) matchedDesc = texts.zone3Desc;

        document.getElementById('ai-result-desc').innerHTML = matchedDesc.replace(/\*\*(.*?)\*\*/g, '<strong class="text-teal-800 bg-teal-100/80 px-2 py-0.5 rounded-md border border-teal-200/50">$1</strong>');
        resultContainer.classList.remove('hidden');
        lucide.createIcons();
      }, 1500);
    }

    function clearAI() {
      const input = document.getElementById('ai-input');
      input.value = '';
      input.dispatchEvent(new Event('input'));
      document.getElementById('ai-result-container').classList.add('hidden');
    }

    // --- COACHES RENDER ---
    function setActiveTopic(topicId) {
      activeTopic = topicId;
      renderCoachFilters();
      renderCoaches();
    }

    function renderCoachFilters() {
      const container = document.getElementById('filter-buttons');
      const texts = t[currentLang];
      
      let html = `<button onclick="setActiveTopic('all')" class="px-6 py-3 rounded-full font-medium transition-all active:scale-95 shadow-sm ${activeTopic === 'all' ? 'bg-teal-600 text-white shadow-teal-500/30' : 'bg-white/80 backdrop-blur-sm text-gray-600 border border-gray-200 hover:bg-teal-50'}">${texts.filterAll}</button>`;
      
      topicsData.forEach(topic => {
        html += `<button onclick="setActiveTopic('${topic.id}')" class="flex items-center gap-2 px-5 py-3 rounded-full font-medium transition-all active:scale-95 border shadow-sm ${activeTopic === topic.id ? 'bg-teal-600 text-white border-teal-600 shadow-teal-500/30' : 'bg-white/80 backdrop-blur-sm text-gray-700 border-gray-200 hover:bg-teal-50'}">
          <i data-lucide="${topic.icon}" class="w-5 h-5"></i> ${topic[currentLang].label}
        </button>`;
      });
      container.innerHTML = html;
      lucide.createIcons();
    }

    function renderCoaches() {
      const grid = document.getElementById('coaches-grid');
      const emptyMsg = document.getElementById('coaches-empty');
      const filtered = activeTopic === 'all' ? coachesData : coachesData.filter(c => c.tags.includes(activeTopic));
      const texts = t[currentLang];

      if (filtered.length === 0) {
        grid.innerHTML = '';
        emptyMsg.textContent = texts.coachCard.empty;
        emptyMsg.classList.remove('hidden');
        return;
      }
      
      emptyMsg.classList.add('hidden');
      
      grid.innerHTML = filtered.map((coach, i) => {
        const tagLabel = topicsData.find(t => t.id === coach.tags[0])?.[currentLang]?.label || 'Recommended';
        const delay = i * 100;
        
        return `
        <div class="fade-in-section h-full" style="transition-delay: ${delay}ms;">
          <div class="group h-full bg-white/80 backdrop-blur-xl rounded-[2.5rem] p-6 sm:p-8 flex flex-col border border-white shadow-[0_8px_30px_rgb(0,0,0,0.06)] hover:shadow-[0_20px_40px_rgb(0,0,0,0.12)] hover:-translate-y-2 transition-all duration-500 cursor-default">
            
            <div class="flex flex-col items-center relative mb-6">
              <div class="relative w-36 h-36 flex items-center justify-center group-hover:scale-105 transition-transform duration-500">
                <div class="absolute inset-2 rounded-full blur-2xl opacity-60 ${coach.bgColor} group-hover:opacity-100 transition-opacity duration-500"></div>
                <div class="relative w-32 h-32 bg-white rounded-full p-2 shadow-md border border-gray-50 z-10">
                  <img src="${coach.localImage || coach.avatarUrl}" alt="${coach.name[currentLang]}" onerror="this.onerror=null;this.src='${coach.avatarUrl}';" class="w-full h-full object-cover rounded-full grayscale opacity-90 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-500" />
                </div>
              </div>
              <h3 class="text-2xl font-black text-gray-900 mt-5 tracking-tight group-hover:text-teal-700 transition-colors">${coach.name[currentLang]}</h3>
              <p class="text-xs font-bold text-gray-400 mt-1.5 uppercase tracking-widest">${coach.style}</p>
            </div>

            <div class="bg-gray-50/50 rounded-2xl p-5 mb-6 border border-gray-100 flex items-center justify-center text-center min-h-[5.5rem] relative overflow-hidden">
              <div class="absolute left-0 top-0 bottom-0 w-1 ${coach.bgColor}"></div>
              <p class="text-[13px] text-gray-700 italic font-semibold leading-relaxed">"${coach.quote[currentLang]}"</p>
            </div>

            <div class="mb-5">
              <h4 class="text-[11px] font-bold text-teal-600 uppercase tracking-wider mb-4 flex items-center gap-1.5">
                <i data-lucide="sparkles" class="w-3.5 h-3.5 text-teal-500"></i> ${texts.coachCard.strengths}
              </h4>
              <ul class="space-y-3">
                ${coach.strengths[currentLang].map(str => `
                  <li class="text-[13px] text-gray-700 flex items-start gap-3 font-medium">
                    <i data-lucide="check-circle-2" class="w-[18px] h-[18px] text-teal-500 shrink-0 mt-0.5"></i>
                    <span class="leading-snug">${str}</span>
                  </li>
                `).join('')}
              </ul>
            </div>

            <div class="mb-8 flex-grow">
              <p class="text-[13px] text-gray-500 leading-relaxed font-medium">${coach.desc[currentLang]}</p>
            </div>

            <div class="mt-auto pt-5 border-t border-gray-100">
              <div class="flex items-center justify-between mb-5">
                <span class="text-[13px] text-gray-500 flex items-center gap-1.5 font-bold"><i data-lucide="calendar-clock" class="w-4 h-4 text-gray-400"></i> ${coach.duration[currentLang]}</span>
                <span class="text-[10px] px-2.5 py-1 rounded-md font-bold uppercase tracking-wide ${coach.tagColor} shadow-sm">${tagLabel}</span>
              </div>
              <button onclick="openModal('${coach.name[currentLang]}')" class="w-full py-4 bg-teal-900 hover:bg-teal-700 text-white rounded-xl font-bold text-[15px] transition-all active:scale-95 shadow-md shadow-teal-900/10 flex items-center justify-center gap-2">
                ${texts.coachCard.btn} ${coach.name[currentLang]} <i data-lucide="chevron-right" class="w-[18px] h-[18px]"></i>
              </button>
            </div>

          </div>
        </div>
        `;
      }).join('');
      
      lucide.createIcons();
      observeNewElements();
    }

    // --- FAQS RENDER ---
    function renderFAQs() {
      const container = document.getElementById('faq-container');
      
      container.innerHTML = faqsData.map((item, index) => {
        const faq = item[currentLang];
        return `
          <div class="border-b border-gray-100 last:border-0 faq-item-wrapper">
            <button onclick="toggleFAQ(${index})" class="w-full text-left py-5 px-4 flex justify-between items-center focus:outline-none group hover:bg-white/50 rounded-xl transition-all">
              <span id="faq-q-${index}" class="font-semibold pr-4 transition-colors text-gray-900 group-hover:text-teal-600">${faq.q}</span>
              <div id="faq-bg-${index}" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition-all bg-gray-50 group-hover:bg-teal-50">
                <i data-lucide="chevron-down" id="faq-icon-${index}" class="text-gray-500 transition-transform duration-300 w-[18px] h-[18px] group-hover:text-teal-600"></i>
              </div>
            </button>
            <div id="faq-ans-${index}" class="overflow-hidden transition-all duration-300 ease-in-out px-4 max-h-0 opacity-0">
              <p class="text-gray-600 leading-relaxed pt-2 font-medium pb-5">${faq.a}</p>
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    let openFaqIndex = -1;
    function toggleFAQ(index) {
      if (openFaqIndex === index) {
        // close it
        document.getElementById(`faq-ans-${index}`).classList.replace('max-h-96', 'max-h-0');
        document.getElementById(`faq-ans-${index}`).classList.replace('opacity-100', 'opacity-0');
        document.getElementById(`faq-icon-${index}`).classList.remove('rotate-180', 'text-teal-600');
        document.getElementById(`faq-bg-${index}`).classList.replace('bg-teal-50', 'bg-gray-50');
        document.getElementById(`faq-q-${index}`).classList.replace('text-teal-700', 'text-gray-900');
        openFaqIndex = -1;
      } else {
        // close previous
        if (openFaqIndex !== -1 && document.getElementById(`faq-ans-${openFaqIndex}`)) {
           document.getElementById(`faq-ans-${openFaqIndex}`).classList.replace('max-h-96', 'max-h-0');
           document.getElementById(`faq-ans-${openFaqIndex}`).classList.replace('opacity-100', 'opacity-0');
           document.getElementById(`faq-icon-${openFaqIndex}`).classList.remove('rotate-180', 'text-teal-600');
           document.getElementById(`faq-bg-${openFaqIndex}`).classList.replace('bg-teal-50', 'bg-gray-50');
           document.getElementById(`faq-q-${openFaqIndex}`).classList.replace('text-teal-700', 'text-gray-900');
        }
        // open new
        document.getElementById(`faq-ans-${index}`).classList.replace('max-h-0', 'max-h-96');
        document.getElementById(`faq-ans-${index}`).classList.replace('opacity-0', 'opacity-100');
        document.getElementById(`faq-icon-${index}`).classList.add('rotate-180', 'text-teal-600');
        document.getElementById(`faq-bg-${index}`).classList.replace('bg-gray-50', 'bg-teal-50');
        document.getElementById(`faq-q-${index}`).classList.replace('text-gray-900', 'text-teal-700');
        openFaqIndex = index;
      }
    }

    // --- MODAL & FORM ---
    function generateMockScheduleLocal(coachName) {
      const schedule = [];
      const today = new Date();
      for (let i = 1; i <= 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        if (d.getDay() === 0 || d.getDay() === 6) continue;
        const seed = (coachName?.length || 0) + d.getDate();
        const allSlots = ['09:00', '10:00', '11:00', '13:30', '14:30', '15:30', '16:00'];
        const availableSlots = allSlots.filter((_, idx) => (seed + idx) % 3 !== 0);
        schedule.push({ date: d, slots: availableSlots });
        if(schedule.length === 4) break; 
      }
      return schedule;
    }

    function openModal(coachName) {
      selectedCoach = coachName;
      document.getElementById('modal-coach-input').value = coachName;
      document.getElementById('modal-name-input').value = '';
      document.getElementById('modal-contact-input').value = '';
      
      schedules = generateMockScheduleLocal(coachName);
      selectedDateIndex = 0;
      selectedTime = '';
      
      setModalStep(1);
      
      const modal = document.getElementById('registration-modal');
      const content = document.getElementById('modal-content-box');
      modal.classList.remove('hidden');
      setTimeout(() => {
        content.classList.remove('opacity-0', 'scale-95');
        content.classList.add('opacity-100', 'scale-100');
      }, 10);
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('registration-modal');
      const content = document.getElementById('modal-content-box');
      content.classList.remove('opacity-100', 'scale-100');
      content.classList.add('opacity-0', 'scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
        document.body.style.overflow = 'unset';
      }, 300);
    }

    function setModalStep(step) {
      const step1Form = document.getElementById('form-step-1');
      const step2Form = document.getElementById('form-step-2');
      const successView = document.getElementById('modal-step-success');
      const stepForms = document.getElementById('modal-step-forms');
      
      const step1Bar = document.getElementById('step1-bar');
      const step2Bar = document.getElementById('step2-bar');

      if (step === 1) {
        stepForms.classList.remove('hidden');
        successView.classList.add('hidden');
        step1Form.classList.remove('hidden');
        step2Form.classList.add('hidden');
        step1Bar.classList.replace('bg-gray-200', 'bg-teal-500');
        step2Bar.classList.replace('bg-teal-500', 'bg-gray-200');
      } else if (step === 2) {
        stepForms.classList.remove('hidden');
        successView.classList.add('hidden');
        step1Form.classList.add('hidden');
        step2Form.classList.remove('hidden');
        step1Bar.classList.replace('bg-gray-200', 'bg-teal-500');
        step2Bar.classList.replace('bg-gray-200', 'bg-teal-500');
        renderDates();
        renderTimes();
      } else if (step === 3) {
        stepForms.classList.add('hidden');
        successView.classList.remove('hidden');
        
        // set success texts
        document.getElementById('success-coach-name').textContent = selectedCoach;
        const d = schedules[selectedDateIndex]?.date;
        document.getElementById('success-date').textContent = d ? d.toLocaleDateString(currentLang==='zh'?'en-US':(currentLang==='en'?'en-US':'th-TH'),{weekday:'short', day:'numeric', month:'short'}) : '';
        document.getElementById('success-time').textContent = selectedTime;
      }
    }

    function handleNextStep(e) {
      e.preventDefault();
      setModalStep(2);
    }

    function renderDates() {
      const container = document.getElementById('modal-date-picker');
      const langConfig = currentLang === 'zh' ? 'en-US' : (currentLang === 'en' ? 'en-US' : 'th-TH');
      
      container.innerHTML = schedules.map((s, idx) => `
        <button type="button" onclick="selectDate(${idx})" class="flex flex-col items-center justify-center min-w-[80px] p-3 rounded-2xl border-2 transition-all snap-start ${selectedDateIndex === idx ? 'border-teal-500 bg-teal-50 text-teal-900 shadow-md' : 'border-gray-100 bg-white text-gray-500 hover:border-teal-200'}">
          <span class="text-xs font-bold uppercase mb-1">${s.date.toLocaleDateString(langConfig, {weekday:'short'})}</span>
          <span class="text-xl font-black">${s.date.getDate()}</span>
        </button>
      `).join('');
    }

    function selectDate(idx) {
      selectedDateIndex = idx;
      selectedTime = '';
      renderDates();
      renderTimes();
      updateSubmitBtn();
    }

    function renderTimes() {
      const container = document.getElementById('modal-time-picker');
      const slots = schedules[selectedDateIndex]?.slots || [];
      const noTimeStr = t[currentLang].modal.noTimeSlots;
      
      if (slots.length > 0) {
        container.innerHTML = `<div class="grid grid-cols-3 gap-3">
          ${slots.map(time => `
            <button type="button" onclick="selectTime('${time}')" class="py-3 rounded-xl font-bold text-sm border-2 transition-all active:scale-95 ${selectedTime === time ? 'border-teal-600 bg-teal-600 text-white shadow-md' : 'border-gray-200 bg-white text-gray-700 hover:border-teal-300'}">
              ${time}
            </button>
          `).join('')}
        </div>`;
      } else {
        container.innerHTML = `<div class="bg-gray-50 text-gray-500 p-4 rounded-xl text-center text-sm font-medium border border-dashed border-gray-300">${noTimeStr}</div>`;
      }
    }

    function selectTime(timeStr) {
      selectedTime = timeStr;
      renderTimes();
      updateSubmitBtn();
    }

    function updateSubmitBtn() {
      const btn = document.getElementById('btn-submit-booking');
      if (selectedTime) {
        btn.disabled = false;
        btn.className = "flex-1 py-4 rounded-xl font-bold transition-all shadow-lg active:scale-95 flex justify-center items-center gap-2 bg-teal-600 hover:bg-teal-700 text-white shadow-teal-600/30";
      } else {
        btn.disabled = true;
        btn.className = "flex-1 py-4 rounded-xl font-bold transition-all shadow-lg active:scale-95 flex justify-center items-center gap-2 bg-gray-300 text-gray-500 shadow-none";
      }
    }

    async function handleSubmitForm(e) {
      e.preventDefault();
      if (!selectedTime) return;
      
      const btn = document.getElementById('btn-submit-booking');
      const submitText = document.getElementById('submit-text');
      const submitIcon = document.getElementById('submit-icon');
      const texts = t[currentLang].modal;
      
      btn.disabled = true;
      submitText.textContent = texts.sendingEmail;
      submitIcon.setAttribute('data-lucide', 'sparkles');
      submitIcon.classList.add('animate-spin');
      lucide.createIcons();

      const name = document.getElementById('modal-name-input').value;
      const contact = document.getElementById('modal-contact-input').value;
      const dateStr = (schedules[selectedDateIndex]?.date || new Date()).toISOString();

      try {
        await fetch(WEBHOOK_URL, { 
          method: 'POST', 
          mode: 'no-cors', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ coach: selectedCoach, name, contact, date: dateStr, time: selectedTime }) 
        });
        
        // Reset UI on success
        btn.disabled = false;
        submitText.textContent = texts.submitBtn;
        submitIcon.setAttribute('data-lucide', 'mail');
        submitIcon.classList.remove('animate-spin');
        
        setModalStep(3);
      } catch (error) {
        btn.disabled = false;
        submitText.textContent = texts.submitBtn;
        submitIcon.setAttribute('data-lucide', 'mail');
        submitIcon.classList.remove('animate-spin');
        alert("Error, please try again.");
      }
    }
  </script>
